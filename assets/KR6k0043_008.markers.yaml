  - {type: variant, offset: 5471, length: 106, content: '以堅牢勞故，頭圓形。Telabhājana.Telabhājana.油筒＝筩【明】【宮】筒【大】，筩【明】【宮】筒筩法者，用角竹胡蘆貞木，不得作男女形狀作Mañcapīṭha（床）, Bhisibimbohana, Bhummattharaṇa, Pādapuñchana, Caṅkamaṇabhisī, Sammujjanī, Kacavarachaḍḍanaka, Rajanadoṇikā, Pānīyanluṅka, Pānīyaghaṭa, Pādakaṭhalikā, Phalakapīṭhaka, Valayādhāraka, Daṇḍadhārika, Pattapidhāna, Ttālavaṇṭavījana.狀、隱囊、覆地、脚巾、經行、机囊、掃󰆠、糞箕、染盆、漉水器、磨脚、瓦石澡洗＝洒【宮】洗【大】，洒【宮】洗洒板鉢支、三杖＝枝【明】【宮】杖【大】，枝【明】【宮】杖枝鉢支、鉢蓋、多羅葉、扇，如是諸物，得作倒巨刻剋鏤諸變。房及房＝戶【明】【宮】【聖】房【大】，戶【明】【宮】【聖】房戶戶扇窓牖，得用七寶作，水精＝精好【明】，好精【宮】,精精【聖】水精【大】，精好【明】，好精【宮】，精精【聖】水精精好好精精精亦得。一切房中施案，無所禁閡＝禁礙【明】【宮】，案礙【聖】禁閡【大】，禁礙【明】【宮】，案礙【聖】禁閡禁礙案礙，唯＝惟【明】【宮】＊唯【大】＊，惟【明】【宮】＊唯惟除難房。」', 宋: '', 元: '', 宮: ''}
