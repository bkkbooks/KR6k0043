  - {type: variant, offset: 5577, length: 346, content: '問曰：「何謂為難房？」答曰：「有勢力王，於他戒場立作故，名難房。應向住者言：『莫於此作房。』若苟執不從，重向言：『莫於此作，我等作布薩自〔恣〕－【聖】恣【大】，〔－〕【聖】恣時即妨礙，縱使竪＝堅【明】【宮】竪【大】，堅【明】【宮】竪堅者，房亦不得安立。』如是故作不止，語至三，猶不應，若眾多比丘有慚愧者，剔壞此房，唯惟

      Ṭhapetvā bodhiñ ca cetiyañ ca.Ṭhapetvā bodhiñ ca cetiyañ ca.置佛殿及菩提樹，壞已勿用，次第舉置，遣送與住比丘，餘草使取。若取者善，不取草爛壞，或為惡人所燒，壞者無罪，住比丘不得責草直。Pālimuttakavinicchayo nitthito.Pālimuttakavinicchayo nitthito.「如是已破檀尼迦屋，檀尼迦復念欲更作。往至守材＝林【聖】＊材【大】＊，林【聖】＊材林人者，檀尼迦覓材林周遍不得，是故往到城守材人所。主材者言：『此是王物，修護國者，城裏有所壞敗，急難防豫，或為火燒，或敵國來攻，或＝伐【明】【聖】或【大】，伐【明】【聖】或伐應擬以作諸戰具，種種資用修儲，是故藏舉此材。』Khaṇḍakhaṇḍikaṃ chedāpetvā.Khaṇḍakhaṇḍikaṃ chedāpetvā.段段餘者，檀尼迦自用，便斫斷段段恣意用，或頭或尾。Vassakāra.Vassakāra.婆娑迦羅者，是婆羅門名也。摩竭國臣者，於國統領國事、財富無量。經歷者，此大臣從國出，按行城中諸材林

      木。Bhaṇe.Bhaṇe.婆那者，是大臣豪貴。喚小者，為婆那。令人縛者，此婆羅門往白王：『審實有與檀尼迦材不？將至王所。』王答：『不與。』是故大臣而縛。', 宋: '', 元: '', 宮: ''}
